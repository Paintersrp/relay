version: "2"
sql:
  - engine: "sqlite"
    queries: "internal/db/queries"
    schema: "internal/db/migrations"
    gen:
      go:
        package: "generated"
        out: "internal/store/generated"
        emit_json_tags: true
        emit_empty_slices: true
  - engine: "sqlite"
    queries: "internal/db/workflow_queries"
    schema: "internal/db/workflow_migrations"
    gen:
      go:
        package: "workflowgenerated"
        out: "internal/store/workflowgenerated"
        emit_json_tags: true
        emit_empty_slices: true
